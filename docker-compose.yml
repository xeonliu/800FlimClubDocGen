version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - TMDB_LANGUAGE=zh-CN
    volumes:
      - ./backend:/app
    env_file:
      - .env
    restart: unless-stopped

  # 前端开发服务（可选，用于开发环境）
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./public:/app/public
    environment:
      - VITE_API_BASE=http://localhost:8000
    restart: unless-stopped
